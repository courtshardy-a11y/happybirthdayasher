<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Asher's Bday Surprise</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="collage left">
        <img src="images/indexleft-collage.png" alt="Left Collage">
    </div>

    <div class="collage right">
        <img src="images/indexright-collage.png" alt="Right Collage">
    </div>

    <header class="header-banner">
        <img src="images/logo.png" alt="Asher's Bday Surprise" class="logo">
    </header>

    <h1 class="title">match 3 to continue</h1>

    <div id="game">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
    </div>

    <div id="message"></div>
    <div id="images"></div>

    <div id="overlay">
        <div id="popup"></div>
    </div>

    <footer class="footer-banner"></footer>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>

</body>
</html>
